# .github/workflows/deploy.yml
name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  packages: write
  contents: write
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/chat-server-app:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Update Kubernetes manifest with new image tag
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/chat-server-app:.*|image: ghcr.io/${{ github.repository_owner }}/chat-server-app:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} master
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:master